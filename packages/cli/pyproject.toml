[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "spectrum-cli"
version = "0.1.1"
description = "Command line interface for Spectrum Core workflows."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "spectrum-core==0.1.1",
  "spectrum-index==0.1.1",
]

[project.scripts]
spectrum-core = "spectrum_cli.main:main"

[tool.setuptools.packages.find]
where = ["src"]
