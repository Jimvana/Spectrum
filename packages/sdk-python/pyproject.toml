[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "spectrum-ai"
version = "0.1.1"
description = "Python SDK for Spectrum packs and lossless retrieval stores."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "spectrum-core==0.1.1",
  "spectrum-index==0.1.1",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["spectrum*"]
