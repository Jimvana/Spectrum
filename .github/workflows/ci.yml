name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Install test dependencies
        run: python -m pip install pytest -e packages/core -e packages/index -e packages/server -e packages/sdk-python -e packages/cli
      - name: Run workspace tests
        run: python scripts/test.py
      - name: Validate npm package contents
        run: npm pack --dry-run
      - name: Smoke test packed npm CLI
        run: npm run smoke:packed
